<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Campus - Register</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-container" style="max-width: 550px; margin: 40px auto;">
    <h1>Create Account</h1>
    <p class="subtitle">Join the Notice Board & Event Hub</p>
    
    <form action="/auth/register" method="POST">
      <div class="form-group">
        <label for="Name">Full Name</label>
        <input type="text" id="Name" name="Name" placeholder="John Doe" required>
      </div>
      
      <div class="form-group">
        <label for="CollegeEmail">College Email Address</label>
        <input type="email" id="CollegeEmail" name="CollegeEmail" placeholder="johndoe@college.edu" required>
      </div>
      
      <div class="form-group">
        <label for="Password">Password</label>
        <input type="password" id="Password" name="Password" placeholder="••••••••" required>
      </div>
      
      <div class="form-group">
        <label for="IDNumber">ID Number / Register Number</label>
        <input type="text" id="IDNumber" name="IDNumber" placeholder="e.g. 21CS101, STAFF04" required>
      </div>
      
      <div class="form-group">
        <label for="Department">Department</label>
        <input type="text" id="Department" name="Department" placeholder="e.g. CSE, ECE, MECH" required>
      </div>
      
      <div class="form-group">
        <label for="Role">Role Type</label>
        <select id="Role" name="Role" required>
          <option value="student">Student</option>
          <option value="faculty">Faculty</option>
          <option value="club_lead">Club Lead</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      
      <button type="submit" class="btn-submit">Register</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">
      Already have an account? <a href="/login.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Login here</a>
    </p>
  </div>
</body>
</html>
